<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VieNeu AI Voice Assistant v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            padding: 30px 20px 10px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            color: #7dd3fc;
        }
        .header p {
            font-size: 14px;
            color: #888;
            margin-top: 6px;
        }
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }
        .mode-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .mode-btn:hover { border-color: #7dd3fc; color: #7dd3fc; }
        .mode-btn.active {
            background: #1e40af;
            border-color: #3b82f6;
            color: #dbeafe;
        }
        .mode-desc {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            text-align: center;
        }
        .chat-container {
            flex: 1;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: #1e40af;
            color: #dbeafe;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .message.assistant .vi-text {
            font-size: 15px;
            margin-bottom: 6px;
        }
        .message.assistant .en-text {
            font-size: 13px;
            color: #7dd3fc;
            font-style: italic;
        }
        .message.assistant .vocab-card {
            margin-top: 8px;
            padding: 8px 12px;
            background: #0f172a;
            border-radius: 8px;
            border-left: 3px solid #7dd3fc;
        }
        .message.assistant .vocab-word {
            font-size: 16px;
            font-weight: 600;
            color: #fbbf24;
        }
        .message.assistant .vocab-meaning {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .message.assistant .vocab-example {
            font-size: 13px;
            color: #e2e8f0;
            margin-top: 4px;
        }
        .message.assistant .vocab-example-vi {
            font-size: 12px;
            color: #7dd3fc;
            font-style: italic;
        }
        .message.assistant .practice-q {
            margin-top: 8px;
            padding: 6px 10px;
            background: #1e40af33;
            border-radius: 6px;
            font-size: 14px;
            color: #fbbf24;
            font-weight: 500;
        }
        .message.assistant .replay-bar {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }
        .replay-btn {
            background: #334155;
            border: none;
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .replay-btn:hover { background: #475569; color: #7dd3fc; }
        .replay-btn.playing { color: #7dd3fc; background: #1e40af; }
        .message.status {
            align-self: center;
            background: transparent;
            color: #666;
            font-size: 13px;
            padding: 4px;
        }
        .message.error {
            align-self: center;
            color: #f87171;
            font-size: 13px;
        }
        .controls {
            padding: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        .record-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid #334155;
            background: #1e293b;
            color: #7dd3fc;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .record-btn:hover { border-color: #7dd3fc; }
        .record-btn.recording {
            background: #dc2626;
            border-color: #f87171;
            color: white;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
            50% { box-shadow: 0 0 0 16px rgba(220,38,38,0); }
        }
        .reset-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
        }
        .reset-btn:hover { border-color: #7dd3fc; color: #7dd3fc; }
        .footer {
            padding: 10px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>VieNeu AI Voice Assistant v2</h1>
        <p>Qwen3-ASR + Gemini + Dual TTS</p>
        <div class="mode-toggle">
            <button class="mode-btn active" id="btnSingle" onclick="setMode('single')">Single TTS</button>
            <button class="mode-btn" id="btnDual" onclick="setMode('dual')">Dual TTS</button>
            <button class="mode-btn" id="btnDual2" onclick="setMode('dual2')">Dual TTS 2</button>
        </div>
        <div class="mode-desc" id="modeDesc">Merged model (VI only)</div>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="controls">
        <button class="reset-btn" onclick="resetChat()">Xoa lich su</button>
        <button class="record-btn" id="recordBtn" onclick="toggleRecording()">&#127908;</button>
    </div>

    <div class="footer">Hold button or press Space to talk</div>

    <script>
        const sessionId = crypto.randomUUID();
        const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${wsProtocol}//${location.host}/ws/${sessionId}`;
        let ws = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let ttsMode = "single"; // "single" or "dual"
        let audioQueue = [];
        let isPlayingAudio = false;
        let lastAssistantDiv = null;  // track latest assistant message for attaching replay buttons
        let lastAssistantAudios = []; // audio data for the latest assistant message

        const modeDescriptions = {
            single: "Merged model (VI only)",
            dual: "Merged model (VI) + Qwen3-TTS (EN)",
            dual2: "VieNeu-TTS 0.5B base (VI) + Qwen3-TTS (EN)",
        };

        function setMode(mode) {
            ttsMode = mode;
            document.getElementById("btnSingle").classList.toggle("active", mode === "single");
            document.getElementById("btnDual").classList.toggle("active", mode === "dual");
            document.getElementById("btnDual2").classList.toggle("active", mode === "dual2");
            document.getElementById("modeDesc").textContent = modeDescriptions[mode];
        }

        function connect() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => addMessage("status", "Da ket noi.");
            ws.onclose = () => {
                addMessage("status", "Mat ket noi. Dang thu ket noi lai...");
                setTimeout(connect, 2000);
            };
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                switch (msg.type) {
                    case "user_text":
                        addMessage("user", msg.text);
                        break;
                    case "assistant_text":
                        addBilingualMessage(msg);
                        break;
                    case "status":
                        addMessage("status", msg.text);
                        break;
                    case "error":
                        addMessage("error", msg.text);
                        break;
                    case "audio":
                        enqueueAudio(msg.data, msg.lang || null);
                        break;
                }
            };
        }

        function addMessage(type, text) {
            const chat = document.getElementById("chat");
            if (type === "status") {
                chat.querySelectorAll(".message.status").forEach(el => el.remove());
            }
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addBilingualMessage(msg) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "message assistant";

            let html = "";
            if (msg.vi) html += `<div class="vi-text">${escapeHtml(msg.vi)}</div>`;
            if (msg.en) html += `<div class="en-text">${escapeHtml(msg.en)}</div>`;

            if (msg.vocabulary) {
                const v = msg.vocabulary;
                html += `<div class="vocab-card">`;
                html += `<div class="vocab-word">${escapeHtml(v.word)}</div>`;
                html += `<div class="vocab-meaning">${escapeHtml(v.meaning)}</div>`;
                html += `<div class="vocab-example">${escapeHtml(v.example)}</div>`;
                if (v.example_vi) html += `<div class="vocab-example-vi">${escapeHtml(v.example_vi)}</div>`;
                html += `</div>`;
            }

            if (msg.practice_question) {
                html += `<div class="practice-q">${escapeHtml(msg.practice_question)}</div>`;
            }

            // Placeholder for replay buttons (will be populated when audio arrives)
            html += `<div class="replay-bar"></div>`;

            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;

            // Track this as the latest assistant message for audio attachment
            lastAssistantDiv = div;
            lastAssistantAudios = [];
        }

        function escapeHtml(text) {
            const d = document.createElement("div");
            d.textContent = text;
            return d.innerHTML;
        }

        // Audio queue: plays audio clips in order (important for dual mode: VI then EN)
        function enqueueAudio(base64Data, lang) {
            audioQueue.push({ data: base64Data, lang: lang });

            // Attach replay button to the latest assistant message
            if (lastAssistantDiv) {
                lastAssistantAudios.push({ data: base64Data, lang: lang });
                updateReplayBar(lastAssistantDiv, [...lastAssistantAudios]);
            }

            if (!isPlayingAudio) {
                playNextAudio();
            }
        }

        function updateReplayBar(msgDiv, audios) {
            const bar = msgDiv.querySelector(".replay-bar");
            if (!bar) return;
            bar.innerHTML = "";

            if (audios.length === 1) {
                // Single audio — one replay button
                const btn = createReplayBtn("Replay", audios.map(a => a.data));
                bar.appendChild(btn);
            } else {
                // Dual mode — individual + play all buttons
                audios.forEach((a) => {
                    const label = a.lang === "vi" ? "VI" : a.lang === "en" ? "EN" : "Replay";
                    const btn = createReplayBtn(label, [a.data]);
                    bar.appendChild(btn);
                });
                const allBtn = createReplayBtn("All", audios.map(a => a.data));
                bar.appendChild(allBtn);
            }
        }

        function createReplayBtn(label, audioDataArray) {
            const btn = document.createElement("button");
            btn.className = "replay-btn";
            btn.innerHTML = `&#9654; ${label}`;
            btn.onclick = () => replayAudios(btn, audioDataArray);
            return btn;
        }

        function replayAudios(btn, audioDataArray, index = 0) {
            if (index >= audioDataArray.length) {
                btn.classList.remove("playing");
                return;
            }
            btn.classList.add("playing");
            const bytes = Uint8Array.from(atob(audioDataArray[index]), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: "audio/wav" });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.onended = () => {
                URL.revokeObjectURL(url);
                replayAudios(btn, audioDataArray, index + 1);
            };
            audio.onerror = () => {
                URL.revokeObjectURL(url);
                btn.classList.remove("playing");
            };
            audio.play().catch(() => btn.classList.remove("playing"));
        }

        function playNextAudio() {
            if (audioQueue.length === 0) {
                isPlayingAudio = false;
                return;
            }
            isPlayingAudio = true;
            const item = audioQueue.shift();
            const bytes = Uint8Array.from(atob(item.data), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: "audio/wav" });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.onended = () => {
                URL.revokeObjectURL(url);
                playNextAudio();
            };
            audio.onerror = () => {
                URL.revokeObjectURL(url);
                playNextAudio();
            };
            audio.play().catch(() => playNextAudio());
        }

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1 }
                });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm;codecs=opus" });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const webmBlob = new Blob(audioChunks, { type: "audio/webm" });
                    const wavBytes = await convertToWav(webmBlob);
                    const b64 = arrayBufferToBase64(wavBytes);
                    ws.send(JSON.stringify({ type: "audio", data: b64, tts_mode: ttsMode }));
                };

                mediaRecorder.start();
                isRecording = true;
                document.getElementById("recordBtn").classList.add("recording");
                document.getElementById("recordBtn").innerHTML = "&#9632;";
            } catch (err) {
                addMessage("error", "Khong the truy cap microphone: " + err.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            isRecording = false;
            document.getElementById("recordBtn").classList.remove("recording");
            document.getElementById("recordBtn").innerHTML = "&#127908;";
        }

        async function convertToWav(webmBlob) {
            const arrayBuffer = await webmBlob.arrayBuffer();
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                sampleRate: 16000
            });
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            audioCtx.close();

            const numSamples = audioBuffer.length;
            const sampleRate = audioBuffer.sampleRate;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);
            const channelData = audioBuffer.getChannelData(0);

            writeString(view, 0, "RIFF");
            view.setUint32(4, 36 + numSamples * 2, true);
            writeString(view, 8, "WAVE");
            writeString(view, 12, "fmt ");
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, "data");
            view.setUint32(40, numSamples * 2, true);

            for (let i = 0; i < numSamples; i++) {
                let s = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return buffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function arrayBufferToBase64(buffer) {
            let binary = "";
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function resetChat() {
            ws.send(JSON.stringify({ type: "reset" }));
            document.getElementById("chat").innerHTML = "";
            audioQueue = [];
            isPlayingAudio = false;
        }

        // Spacebar to record
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !e.repeat && !isRecording) {
                e.preventDefault();
                startRecording();
            }
        });
        document.addEventListener("keyup", (e) => {
            if (e.code === "Space" && isRecording) {
                e.preventDefault();
                stopRecording();
            }
        });

        connect();
    </script>
</body>
</html>
