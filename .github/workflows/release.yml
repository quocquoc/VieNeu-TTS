name: 🚀 Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Trigger only when a new version tag (e.g., v2.0.0) is pushed

jobs:
  build_and_publish:
    name: Build & Publish VieNeu-TTS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🛠️ Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 🏗️ Build Distribution (Wheel & Source)
        run: python -m build

      - name: 🔬 Check Package Integrity
        run: python -m twine check dist/*

      - name: 🚀 Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # To check before real publish, use repository-url: https://test.pypi.org/legacy/
